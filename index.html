<!DOCTYPE html>
<html lang="ko">
  <head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안녕하세요</title>

    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>안녕하세용</h1>
    <p>이건 제가 처음 만든 웹페이지입니다</p>
    <button onclick="changeText()">이게 뭔가요?</button>
    <p id="text">잘 모르겠습니다</p>
    <script>
      function changeText() {
        document.getElementById("text").innerText = "나는 여우가 좋아요";
      }
    </script>
    <input type="text" id="nameinput">
    <button onclick="showText()">확인</button>

    <p id="result"></p>
    
    <script>
      function showText() {
        let value = document.getElementById("nameinput").value;
        document.getElementById("result").innerText = value;
      }
    </script>
  </body>
</html>
